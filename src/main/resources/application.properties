server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/vip_transport_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Dile a Thymeleaf que ignore los nombres de los JSP
spring.thymeleaf.excluded-view-names=formulario_puro,formulario_jstl