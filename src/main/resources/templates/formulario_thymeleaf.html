<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>VIP Experience | Premium Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
		:root {
		    --gold: #D4AF37;
		    --gold-light: #F9E27D;
		    --dark-overlay: rgba(0, 0, 0, 0.75);
		}

		body {
		    /* Imagen de fondo que me pasaste con un filtro oscuro para que el texto resalte */
		    background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
		                url('https://www.deutschland.de/sites/default/files/styles/image_carousel_mobile/public/media/image/tdt_15052020_wie_familien_in_deutschland_leben_gemeinsam.jpg?itok=1KaBjDjQ');
		    background-size: cover;
		    background-attachment: fixed;
		    background-position: center;
		    color: white;
		    font-family: 'Poppins', sans-serif;
		}

		/* Tarjetas con efecto cristal (Glassmorphism) */
		.glass-card {
		    background: rgba(255, 255, 255, 0.08);
		    backdrop-filter: blur(12px);
		    -webkit-backdrop-filter: blur(12px);
		    border: 1px solid rgba(212, 175, 55, 0.3);
		    border-radius: 20px;
		    padding: 30px;
		    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
		}

		/* BOTÓN PREMIUM INNOVADOR */
		.btn-premium {
		    background: linear-gradient(45deg, #B8860B, #D4AF37, #F9E27D);
		    background-size: 200% auto;
		    color: #000 !important;
		    border: none;
		    padding: 18px 30px;
		    font-weight: 800;
		    border-radius: 50px;
		    text-transform: uppercase;
		    letter-spacing: 2px;
		    transition: 0.5s;
		    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
		    width: 100%;
		    cursor: pointer;
		}

		.btn-premium:hover {
		    background-position: right center; /* Efecto de brillo al pasar el mouse */
		    transform: translateY(-3px);
		    box-shadow: 0 10px 25px rgba(212, 175, 55, 0.6);
		    color: #000;
		}

		.gold-gradient {
		    background: linear-gradient(to right, #D4AF37, #FFFFFF);
		    -webkit-background-clip: text;
		    -webkit-text-fill-color: transparent;
		    font-weight: bold;
		}
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-3 gold-gradient">VIP TRANSPORT</h1>
            <p class="text-secondary">PREMIUM TRAVEL SOLUTIONS & CONCIERGE</p>
        </div>

        <form th:action="@{/guardarNivel3}" th:object="${reserva}" method="post">
            <div class="row g-4">
                <!-- SECCIÓN 1: SOLICITANTE -->
                <div class="col-md-6">
                    <div class="glass-card h-100">
                        <h4 class="mb-4"><i class="fas fa-user-tie section-icon"></i>1. Solicitante</h4>
                        <div class="mb-3">
                            <label>Nombre Completo</label>
                            <input type="text" th:field="*{nombreCompleto}" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label>Correo Electrónico</label>
                            <input type="email" th:field="*{correo}" class="form-control" placeholder="vip@luxury.com" required>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: SERVICIO -->
                <div class="col-md-6">
                    <div class="glass-card h-100">
                        <h4 class="mb-4"><i class="fas fa-concierge-bell section-icon"></i>2. Servicio</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Tipo de Servicio</label>
                                <select th:field="*{tipoServicio}" class="form-select">
                                    <option value="AEROPUERTO">Traslado Aeropuerto</option>
                                    <option value="BODA">Evento / Boda</option>
                                    <option value="HORAS">Por Horas</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Fecha</label>
                                <input type="date" th:field="*{fechaServicio}" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Origen</label>
                            <input type="text" th:field="*{origen}" class="form-control" placeholder="Hotel / Aeropuerto">
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 4 & 6: VEHÍCULO Y VIP -->
                <div class="col-12">
                    <div class="glass-card">
                        <h4 class="mb-4"><i class="fas fa-crown section-icon"></i>Requerimientos VIP</h4>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label>Categoría de Vehículo</label>
                                <select th:field="*{categoriaVehiculo}" class="form-select">
                                    <option value="SUV">SUV de Lujo</option>
                                    <option value="SEDAN">Sedán Ejecutivo</option>
                                    <option value="VAN">Van / Sprinter</option>
                                </select>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label>Amenidades y Notas Especiales</label>
                                <textarea th:field="*{observaciones}" class="form-control" rows="2" placeholder="Champaña, Conductor Bilingüe, Clima a 20°C..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

               
				<!-- SECCIÓN 8: CONFIRMACIÓN -->
				<div class="row mt-4">
				    <div class="col-12">
				        <div class="glass-card text-center">
				            <h4 class="gold-gradient mb-4"><i class="fas fa-file-signature me-2"></i>8. Confirmación de Reserva</h4>
				            
				            <div class="text-start d-inline-block mb-4">
				                <div class="form-check mb-3">
				                    <input class="form-check-input" type="checkbox" th:field="*{aceptaTerminos}" id="checkTerminos" required>
				                    <label class="form-check-label text-light" for="checkTerminos">
				                        Acepto términos y condiciones de transporte VIP
				                    </label>
				                </div>
				                <div class="form-check mb-3">
				                    <input class="form-check-input" type="checkbox" th:field="*{aceptaDatos}" id="checkDatos" required>
				                    <label class="form-check-label text-light" for="checkDatos">
				                        Autorizo tratamiento de datos personales (Ley 1581)
				                    </label>
				                </div>
				                <div class="form-check mb-3">
				                    <input class="form-check-input" type="checkbox" th:field="*{aceptaCancelacion}" id="checkCancel" required>
				                    <label class="form-check-label text-light" for="checkCancel">
				                        Acepto la política de cancelación y reembolsos
				                    </label>
				                </div>
				            </div>

				            <div class="mt-2">
				                <button type="submit" class="btn-premium">
				                    <i class="fas fa-paper-plane me-2"></i> Confirmar Reserva Premium
				                </button>
				            </div>
				            <p class="mt-3 small text-secondary">Su solicitud será procesada por un agente VIP en menos de 15 minutos.</p>
				        </div>
				    </div>
				</div>
            </div>
        </form>
    </div>
</body>
</html>
